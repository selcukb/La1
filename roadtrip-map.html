<style>
:root{
  --bg:#f1f5f9;--surface:#fff;--surface2:#f8fafc;
  --border:#e2e8f0;--text:#1e293b;--muted:#64748b;--accent:#e85d04;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
header{background:#fff;border-bottom:2px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent)}
.rpills{display:flex;align-items:center;gap:6px}
.rpill{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:800}
.rpill.sf{background:#dbeafe;color:#1d4ed8}
.rpill.la{background:#fef3c7;color:#b45309}
.rpill.lv{background:#fee2e2;color:#b91c1c}
.rarr{color:#cbd5e1;font-weight:900}
.hstats{margin-left:auto;display:flex;gap:18px}
.hstat{display:flex;flex-direction:column;align-items:center}
.hstat-n{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.hstat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700}

.main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:315px;background:#fff;border-right:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;box-shadow:2px 0 10px rgba(0,0,0,.05)}

.sb-block{padding:9px 10px;border-bottom:1px solid var(--border)}
.sb-block input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:7px 11px;font-size:12px;font-family:'Nunito',sans-serif;color:var(--text);background:var(--surface2);outline:none;transition:border-color .2s}
.sb-block input:focus{border-color:var(--accent)}
.sb-block input::placeholder{color:var(--muted)}

.filter-row{display:flex;gap:5px;flex-wrap:wrap}
.fbtn{padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif}
.fbtn.active,.fbtn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.vbtn{flex:1;padding:5px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.vbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.cat-chips{display:flex;flex-wrap:wrap;gap:4px;max-height:88px;overflow-y:auto}
.cchip{padding:3px 7px;border-radius:12px;font-size:10px;font-weight:800;cursor:pointer;border:1.5px solid transparent;transition:all .15s;user-select:none}
.cchip.on{opacity:1}.cchip.off{opacity:.28;filter:grayscale(.9)}

/* DIRECTIONS */
.dir-title{font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.dir-inp{display:flex;gap:5px;margin-bottom:5px}
.dir-inp input{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:6px 9px;font-size:11px;font-family:'Nunito',sans-serif;color:var(--text);background:#fff;outline:none}
.dir-inp input:focus{border-color:var(--accent)}
.loc-btn{padding:0 9px;border-radius:7px;border:1.5px solid var(--border);background:#fff;color:var(--accent);font-size:13px;cursor:pointer;transition:all .15s}
.loc-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.dir-modes{display:flex;gap:4px}
.mode-btn{flex:1;padding:6px 4px;border-radius:7px;border:none;font-size:10px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.mode-btn.car{background:#fef3c7;color:#b45309}.mode-btn.car:hover{background:#fde68a}
.mode-btn.walk{background:#dcfce7;color:#16a34a}.mode-btn.walk:hover{background:#bbf7d0}
.mode-btn.clr{background:#fee2e2;color:#dc2626}.mode-btn.clr:hover{background:#fecaca}

/* LIST */
.sb-list{flex:1;overflow-y:auto;padding:5px}
.sb-list::-webkit-scrollbar{width:4px}
.sb-list::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px}
.grp-hdr{padding:6px 8px 2px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.grp-cnt{background:var(--accent);color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:10px}
.pi{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:8px;margin-bottom:2px;cursor:pointer;transition:all .15s;position:relative;border:1.5px solid transparent}
.pi:hover{background:var(--surface2);border-color:var(--border)}
.pi.active-item{background:#fff7ed;border-color:#fed7aa}
.pi.visited{background:#f0fdf4;opacity:.7}
.pi.removed{display:none}
.pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;box-shadow:0 0 0 2px #fff}
.pinfo{flex:1;min-width:0}
.pname{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pmeta{font-size:10px;color:var(--muted);margin-top:1px;font-weight:600}
.pbtns{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity .15s}
.pi:hover .pbtns,.pi.active-item .pbtns{opacity:1}
.pbtn{width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
.pbtn.v{background:#dcfce7;color:#16a34a}.pbtn.v:hover{background:#bbf7d0}
.pbtn.d{background:#dbeafe;color:#1d4ed8}.pbtn.d:hover{background:#bfdbfe}
.pbtn.r{background:#fee2e2;color:#dc2626}.pbtn.r:hover{background:#fecaca}
.vbadge{position:absolute;top:7px;right:6px;font-size:9px;background:#dcfce7;color:#16a34a;padding:1px 5px;border-radius:4px;font-weight:800}
.empty-msg{text-align:center;padding:28px 14px;color:var(--muted);font-size:13px;line-height:1.7;font-weight:600}

/* MAP */
#mapDiv{flex:1;position:relative}
#hereMap{width:100%;height:100%}

/* POPUP CARD */
.map-card{position:absolute;bottom:16px;left:16px;background:#fff;border-radius:12px;padding:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);border:1.5px solid var(--border);min-width:240px;max-width:300px;z-index:500;display:none}
.map-card.show{display:block}
.mc-close{position:absolute;top:8px;right:10px;background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);line-height:1}
.mc-cat{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.mc-name{font-size:15px;font-weight:900;margin-bottom:2px;color:var(--text)}
.mc-city{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px}
.mc-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;font-weight:600}
.mc-btns{display:flex;gap:6px;flex-wrap:wrap}
.mc-btn{padding:6px 10px;border-radius:7px;border:none;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.mc-v{background:#dcfce7;color:#16a34a}.mc-v:hover{background:#bbf7d0}
.mc-d{background:#dbeafe;color:#1d4ed8}.mc-d:hover{background:#bfdbfe}
.mc-gm{background:#fef3c7;color:#b45309}.mc-gm:hover{background:#fde68a}
.mc-r{background:#fee2e2;color:#dc2626}.mc-r:hover{background:#fecaca}

/* LEGEND */
.map-legend{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.97);border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;z-index:400;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.leg-t{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.leg-i{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:10px;font-weight:700;color:var(--text)}
.leg-d{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* HERE UI overrides */
.H_ib_body{font-family:'Nunito',sans-serif!important}
.H_l_left{display:none}
</style>
</head>

<header>

    <div class="hstat"><div class="hstat-n" id="s-removed" style="color:#dc2626">0</div><div class="hstat-l">Silindi ✗</div></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sb-block">
      <input id="search" placeholder="🔍 Yer ara..." oninput="renderList()">
    </div>
    <div class="sb-block">
      <div class="filter-row" id="cityBtns">
        <button class="fbtn active" onclick="setCF('all',this)">Tümü</button>
        <button class="fbtn" onclick="setCF('SF',this)">🌁 SF</button>
        <button class="fbtn" onclick="setCF('LA',this)">🌴 LA</button>
        <button class="fbtn" onclick="setCF('LV',this)">🎰 Vegas</button>
        <button class="fbtn" onclick="setCF('ROAD',this)">🛣️ Yol</button>
      </div>
    </div>
    <div class="sb-block">
      <div class="filter-row">
        <button class="vbtn active" id="vf-all" onclick="setVF('all')">Tümü</button>
        <button class="vbtn" id="vf-pending" onclick="setVF('pending')">Bekliyor</button>
        <button class="vbtn" id="vf-visited" onclick="setVF('visited')">Gezildi ✓</button>
      </div>
    </div>
    <div class="sb-block">
      <div class="cat-chips" id="catChips"></div>
    </div>

    <!-- Yol Tarifi -->
    <div class="sb-block">
      <div class="dir-title">🧭 Yol Tarifi</div>
      <div class="dir-inp">
        <input id="dirFrom" placeholder="Başlangıç...">
        <button class="loc-btn" onclick="useMyLoc()" title="Konumumu kullan">📍</button>
      </div>
      <div class="dir-inp">
        <input id="dirTo" placeholder="Varış noktası...">
      </div>
      <div class="dir-modes">
        <button class="mode-btn car" onclick="calcRoute('car')">🚗 Araba</button>
        <button class="mode-btn walk" onclick="calcRoute('pedestrian')">🚶 Yürüyüş</button>
        <button class="mode-btn clr" onclick="clearRoute()">✕ Temizle</button>
      </div>
    </div>

    <div class="sb-list" id="placeList"></div>
  </div>

  <div id="mapDiv">
    <div id="hereMap"></div>

    <!-- Info card -->
    <div class="map-card" id="mapCard">
      <button class="mc-close" onclick="closeCard()">×</button>
      <div class="mc-cat" id="mc-cat"></div>
      <div class="mc-name" id="mc-name"></div>
      <div class="mc-city" id="mc-city"></div>
      <div class="mc-desc" id="mc-desc"></div>
      <div class="mc-btns">
        <button class="mc-btn mc-v" id="mc-v" onclick="markVActive()">✓ Gezildi</button>
        <button class="mc-btn mc-d" onclick="dirToActive()">🧭 Yol Tarifi</button>
        <button class="mc-btn mc-gm" onclick="openGMActive()">🗺️ Google Maps</button>
        <button class="mc-btn mc-r" onclick="markRActive()">✗ Sil</button>
      </div>
    </div>

    <!-- Legend -->
    <div class="map-legend" id="legend"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

function svgDot(color, visited) {
  const size = visited ? 14 : 10;
  const stroke = visited ? `stroke="#22c55e" stroke-width="2.5"` : '';
  return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="${size+4}" height="${size+4}"><circle cx="${(size+4)/2}" cy="${(size+4)/2}" r="${size/2}" fill="${color}" ${stroke}/></svg>`)}`;
}

function addAllMarkers() {
  places.forEach(p => {
    if(p.status==='removed') return;
    addMarker(p);
  });
}

function addMarker(p) {
  if(!hMap) return;
  const cat = CATS[p.cat];
  const color = cat ? cat.color : '#888';
  const icon = new H.map.Icon(svgDot(color, p.status==='visited'), {size:{w:14,h:14}});
  const m = new H.map.Marker({lat:p.lat, lng:p.lng}, {icon, data:{id:p.id}});
  m.addEventListener('tap', () => { focusPlace(p.id); });
  hMap.addObject(m);
  markers[p.id] = m;
}

function updateMarkerIcon(p) {
  const m = markers[p.id];
  if(!m || !hMap) return;
  const cat = CATS[p.cat];
  const color = cat ? cat.color : '#888';
  m.setIcon(new H.map.Icon(svgDot(color, p.status==='visited'), {size:{w:14,h:14}}));
}

function removeMarker(id) {
  const m = markers[id];
  if(m && hMap) { hMap.removeObject(m); delete markers[id]; }
}

function drawRouteLine() {
  if(!hMap) return;
  const pts = [
    {lat:37.7749,lng:-122.4194},{lat:36.27,lng:-121.81},
    {lat:34.42,lng:-119.70},{lat:34.052,lng:-118.244},
    {lat:33.873,lng:-115.90},{lat:36.115,lng:-115.173}
  ];
  const lineString = new H.geo.LineString();
  pts.forEach(p => lineString.pushPoint(p));
  hMap.addObject(new H.map.Polyline(lineString, {
    style:{strokeColor:'rgba(232,93,4,0.45)',lineWidth:3,lineDash:[8,8]}
  }));
}

// ═══════════════════════════════════════
// FOCUS / INFO CARD
// ═══════════════════════════════════════
function focusPlace(id) {
  const p = places.find(x=>x.id===id);
  if(!p) return;
  activeId = id;

  if(hMap) hMap.setCenter({lat:p.lat,lng:p.lng}, true);
  if(hMap) hMap.setZoom(14, true);

  const cat = CATS[p.cat];
  const cn = {SF:'San Francisco',LA:'Los Angeles',LV:'Las Vegas',ROAD:'Yol Üzeri'}[p.city]||p.city;
  document.getElementById('mc-cat').textContent = cat ? cat.emoji+' '+cat.label : p.cat;
  document.getElementById('mc-cat').style.color = cat ? cat.color : '#888';
  document.getElementById('mc-name').textContent = p.name;
  document.getElementById('mc-city').textContent = '📍 '+cn;
  document.getElementById('mc-desc').textContent = p.desc;
  const vb = document.getElementById('mc-v');
  vb.textContent = p.status==='visited' ? '↩ Geri Al' : '✓ Gezildi';
  vb.style.background = p.status==='visited' ? '#bbf7d0' : '#dcfce7';
  document.getElementById('mapCard').classList.add('show');

  // Highlight list
  document.querySelectorAll('.pi').forEach(el=>el.classList.remove('active-item'));
  const el=document.getElementById('pi-'+id);
  if(el){el.classList.add('active-item');el.scrollIntoView({block:'nearest',behavior:'smooth'});}
}

function closeCard() { document.getElementById('mapCard').classList.remove('show'); activeId=null; }

// ═══════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════
function calcRoute(mode) {
  if(!router) { showToast('Harita yükleniyor, lütfen bekleyin'); return; }
  const from = document.getElementById('dirFrom').value.trim();
  const to = document.getElementById('dirTo').value.trim();
  if(!from || !to) { showToast('Başlangıç ve varış noktası girin!'); return; }

  showToast('🧭 Rota hesaplanıyor...');
  clearRoute();

  // Geocode both, then route
  const geo = platform.getSearchService();
  geo.geocode({q:from}, res=>{
    const fp = res.items[0]?.position;
    if(!fp){ showToast('Başlangıç noktası bulunamadı'); return; }
    geo.geocode({q:to}, res2=>{
      const tp = res2.items[0]?.position;
      if(!tp){ showToast('Varış noktası bulunamadı'); return; }

      router.calculateRoute({
        transportMode: mode,
        origin: `${fp.lat},${fp.lng}`,
        destination: `${tp.lat},${tp.lng}`,
        return: 'polyline,summary'
      }, result => {
        const route = result.routes[0];
        if(!route){ showToast('Rota bulunamadı'); return; }

        const lineString = H.geo.LineString.fromFlexiblePolyline(route.sections[0].polyline);
        routingLayer = new H.map.Polyline(lineString, {
          style:{strokeColor:'#2563eb',lineWidth:5,lineCap:'round'}
        });
        hMap.addObject(routingLayer);
        hMap.getViewModel().setLookAtData({bounds: routingLayer.getBoundingBox()});

        const dist = (route.sections[0].summary.length/1000).toFixed(1);
        const dur = Math.round(route.sections[0].summary.duration/60);
        showToast(`✅ ${dist} km · ${dur} dakika`);
      }, err => showToast('Rota hatası: '+err));
    }, err => showToast('Varış bulunamadı'));
  }, err => showToast('Başlangıç bulunamadı'));
}

function clearRoute() {
  if(routingLayer && hMap) { hMap.removeObject(routingLayer); routingLayer=null; }
}

function useMyLoc() {
  if(!navigator.geolocation){ showToast('Konum desteklenmiyor'); return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat, longitude:lng} = pos.coords;
    document.getElementById('dirFrom').value = `${lat.toFixed(5)},${lng.toFixed(5)}`;
    if(hMap) { hMap.setCenter({lat,lng},true); hMap.setZoom(13,true); }
    showToast('📍 Konumunuz bulundu!');
  }, ()=>showToast('Konum alınamadı'));
}

function dirToActive() {
  if(activeId===null) return;
  const p=places.find(x=>x.id===activeId);if(!p)return;
  document.getElementById('dirTo').value = p.name+', '+{SF:'San Francisco CA',LA:'Los Angeles CA',LV:'Las Vegas NV',ROAD:'California'}[p.city];
  showToast('Varış noktası ayarlandı!');
}

function openGMActive() {
  if(activeId===null) return;
  const p=places.find(x=>x.id===activeId);if(!p)return;
  window.open(`https://www.google.com/maps/search/${encodeURIComponent(p.name)}/@${p.lat},${p.lng},15z`,'_blank');
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function markV(id,e) {
  if(e) e.stopPropagation();
  const p=places.find(x=>x.id===id);if(!p)return;
  p.status = p.status==='visited' ? 'pending' : 'visited';
  updateMarkerIcon(p);
  const el=document.getElementById('pi-'+id);
  if(el){
    el.className='pi '+(p.status)+' '+(el.classList.contains('active-item')?'active-item':'');
    const b=el.querySelector('.vbadge');
    if(p.status==='visited'&&!b) el.insertAdjacentHTML('beforeend','<div class="vbadge">✓</div>');
    if(p.status!=='visited'&&b) b.remove();
  }
  if(activeId===id){
    const vb=document.getElementById('mc-v');
    vb.textContent=p.status==='visited'?'↩ Geri Al':'✓ Gezildi';
    vb.style.background=p.status==='visited'?'#bbf7d0':'#dcfce7';
  }
  updateStats();
  showToast(p.status==='visited'?'✅ Gezildi olarak işaretlendi':'↩ Geri alındı');
}

function markR(id,e) {
  if(e) e.stopPropagation();
  const p=places.find(x=>x.id===id);if(!p)return;
  p.status='removed';
  removeMarker(id);
  const el=document.getElementById('pi-'+id);if(el) el.style.display='none';
  if(activeId===id) closeCard();
  updateStats();
  showToast('🗑️ Listeden silindi');
}

function markVActive() { if(activeId!==null) markV(activeId); }
function markRActive() { if(activeId!==null) { markR(activeId); closeCard(); } }

function setDirTo(id,e) {
  if(e) e.stopPropagation();
  const p=places.find(x=>x.id===id);if(!p)return;
  document.getElementById('dirTo').value = p.name+', '+{SF:'San Francisco CA',LA:'Los Angeles CA',LV:'Las Vegas NV',ROAD:'California'}[p.city];
  showToast('📍 Varış: '+p.name);
}

// ═══════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════
function setCF(city,btn) {
  cityFilter=city;
  document.querySelectorAll('#cityBtns .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}
function setVF(v) {
  viewFilter=v;
  ['all','pending','visited'].forEach(x=>document.getElementById('vf-'+x).classList.toggle('active',x===v));
  renderList();
}
function toggleCat(cat) {
  catFilters.has(cat)?catFilters.delete(cat):catFilters.add(cat);
  document.querySelectorAll('.cchip').forEach(c=>{
    if(c.dataset.cat===cat){c.classList.toggle('on',catFilters.has(cat));c.classList.toggle('off',!catFilters.has(cat));}
  });
  renderList();
}

// ═══════════════════════════════════════
// RENDER LIST
// ═══════════════════════════════════════
function renderList() {
  const q=document.getElementById('search').value.toLowerCase();
  const filt=places.filter(p=>{
    if(p.status==='removed') return false;
    if(viewFilter==='pending'&&p.status!=='pending') return false;
    if(viewFilter==='visited'&&p.status!=='visited') return false;
    if(cityFilter!=='all'&&p.city!==cityFilter) return false;
    if(!catFilters.has(p.cat)) return false;
    if(q&&!p.name.toLowerCase().includes(q)&&!p.desc.toLowerCase().includes(q)) return false;
    return true;
  });
  if(!filt.length){
    document.getElementById('placeList').innerHTML='<div class="empty-msg">Sonuç bulunamadı</div>';
    return;
  }
  const groups={};
  const order=['SF','ROAD','LA','LV'];
  const cnames={SF:'🌁 San Francisco',LA:'🌴 Los Angeles',LV:'🎰 Las Vegas',ROAD:'🛣️ Yol Üzeri'};
  filt.forEach(p=>{if(!groups[p.city])groups[p.city]=[];groups[p.city].push(p);});
  let html='';
  order.forEach(city=>{
    if(!groups[city])return;
    html+=`<div class="grp-hdr"><span>${cnames[city]}</span><span class="grp-cnt">${groups[city].length}</span></div>`;
    groups[city].forEach(p=>{
      const cat=CATS[p.cat];const color=cat?cat.color:'#888';
      html+=`<div class="pi ${p.status}" id="pi-${p.id}" onclick="focusPlace(${p.id})">
        <div class="pdot" style="background:${color}"></div>
        <div class="pinfo">
          <div class="pname">${cat?cat.emoji:''} ${p.name}</div>
          <div class="pmeta">${cat?cat.label:p.cat}</div>
        </div>
        <div class="pbtns">
          <button class="pbtn v" onclick="markV(${p.id},event)" title="Gezildi">✓</button>
          <button class="pbtn d" onclick="setDirTo(${p.id},event)" title="Yol tarifi">🧭</button>
          <button class="pbtn r" onclick="markR(${p.id},event)" title="Sil">✗</button>
        </div>
        ${p.status==='visited'?'<div class="vbadge">✓</div>':''}
      </div>`;
    });
  });
  document.getElementById('placeList').innerHTML=html;
}

// ═══════════════════════════════════════
// CHIPS & LEGEND & STATS
// ═══════════════════════════════════════
function renderChips() {
  document.getElementById('catChips').innerHTML=Object.entries(CATS).map(([k,v])=>{
    const cnt=places.filter(p=>p.cat===k&&p.status!=='removed').length;
    return `<div class="cchip on" data-cat="${k}" style="background:${v.color}22;color:${v.color};border-color:${v.color}55" onclick="toggleCat('${k}')">${v.emoji} ${v.label} <b>${cnt}</b></div>`;
  }).join('');
}
function renderLegend() {
  document.getElementById('legend').innerHTML='<div class="leg-t">Kategoriler</div>'+
    Object.entries(CATS).map(([k,v])=>`<div class="leg-i"><div class="leg-d" style="background:${v.color}"></div>${v.emoji} ${v.label}</div>`).join('')+
    '<div style="margin-top:6px;padding-top:6px;border-top:1px solid #e2e8f0"><div class="leg-i"><div class="leg-d" style="background:#22c55e;border:2px solid #22c55e"></div>✓ Gezildi</div></div>';
}
function updateStats() {
  document.getElementById('s-total').textContent=places.filter(p=>p.status!=='removed').length;
  document.getElementById('s-visited').textContent=places.filter(p=>p.status==='visited').length;
  document.getElementById('s-removed').textContent=places.filter(p=>p.status==='removed').length;
}
function showToast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>{
  renderChips();
  renderLegend();
  renderList();
  updateStats();
  initHere();
});
</script>
